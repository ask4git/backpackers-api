version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: backpackers
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # docker-compose 로컬 실행 시 DB 호스트를 컨테이너 이름으로 오버라이드
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/backpackers
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
