name: Deploy to Lightsail

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.claude/**'
  workflow_dispatch:

env:
  SERVICE_NAME: backpackers-api
  REGION: ap-northeast-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: mvp-prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Install lightsailctl
        run: |
          curl -sLo /tmp/lightsailctl \
            "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl"
          sudo mv /tmp/lightsailctl /usr/local/bin/lightsailctl
          sudo chmod +x /usr/local/bin/lightsailctl

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64)
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ env.SERVICE_NAME }}:${{ github.sha }} \
            .

      - name: Push image to Lightsail
        id: push
        run: |
          PUSH_OUTPUT=$(aws lightsail push-container-image \
            --region ${{ env.REGION }} \
            --service-name ${{ env.SERVICE_NAME }} \
            --label ${{ env.SERVICE_NAME }} \
            --image ${{ env.SERVICE_NAME }}:${{ github.sha }} 2>&1) || true
          echo "$PUSH_OUTPUT"
          IMAGE_TAG=$(echo "$PUSH_OUTPUT" | grep -oP '(?<=Refer to this image as ").*(?=")')
          if [ -z "$IMAGE_TAG" ]; then
            echo "ERROR: Failed to extract image tag. Push may have failed."
            exit 1
          fi
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Create deployment config
        env:
          IMAGE_TAG: ${{ steps.push.outputs.image_tag }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ vars.DB_NAME }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import json, os

          image_tag = os.environ["IMAGE_TAG"]
          environment = {
              "DB_HOST":              os.environ["DB_HOST"],
              "DB_PORT":              os.environ["DB_PORT"],
              "DB_USER":              os.environ["DB_USER"],
              "DB_PASSWORD":          os.environ["DB_PASSWORD"],
              "DB_NAME":              os.environ["DB_NAME"],
              "SECRET_KEY":           os.environ["SECRET_KEY"],
              "GOOGLE_CLIENT_ID":     os.environ["GOOGLE_CLIENT_ID"],
              "CORS_ORIGINS":         os.environ["CORS_ORIGINS"],
              "ENVIRONMENT":          "prod",
              "ADMIN_USERNAME":       os.environ["ADMIN_USERNAME"],
              "ADMIN_PASSWORD":       os.environ["ADMIN_PASSWORD"],
          }
          config = {
              os.environ["SERVICE_NAME"]: {
                  "image": image_tag,
                  "ports": {"8000": "HTTP"},
                  "environment": environment,
              }
          }
          with open("/tmp/containers.json", "w") as f:
              json.dump(config, f)
          print("containers.json created")
          EOF

      - name: Deploy to Lightsail
        run: |
          aws lightsail create-container-service-deployment \
            --region ${{ env.REGION }} \
            --service-name ${{ env.SERVICE_NAME }} \
            --containers file:///tmp/containers.json \
            --public-endpoint '{
              "containerName": "${{ env.SERVICE_NAME }}",
              "containerPort": 8000,
              "healthCheck": {
                "path": "/health",
                "intervalSeconds": 10,
                "timeoutSeconds": 5,
                "successCodes": "200",
                "unhealthyThreshold": 2,
                "healthyThreshold": 2
              }
            }'

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to complete (max 10 minutes)..."
          for i in $(seq 1 30); do
            STATE=$(aws lightsail get-container-services \
              --region ${{ env.REGION }} \
              --service-name ${{ env.SERVICE_NAME }} \
              --query 'containerServices[0].state' \
              --output text)
            echo "Attempt $i/30: State = $STATE"
            if [ "$STATE" = "RUNNING" ]; then
              echo "Deployment successful!"
              exit 0
            fi
            sleep 20
          done
          echo "Deployment timed out"
          exit 1
